name: release

# Build the single-file `bridle` desktop binaries for every platform and attach
# them to the GitHub Release. The installer at bridle.3sln.com/install.sh pulls
# these by name (bridle-<os>-<arch>[.exe]).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            out: bridle-linux-x64
          - target: bun-linux-arm64
            out: bridle-linux-arm64
          - target: bun-darwin-x64
            out: bridle-darwin-x64
          - target: bun-darwin-arm64
            out: bridle-darwin-arm64
          - target: bun-windows-x64
            out: bridle-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # werift is pure JS (cross-compiles fine); webview-bun is native + optional,
      # so keep it external and let it load at runtime when present.
      - name: Compile ${{ matrix.out }}
        run: |
          bun build packages/desktop/src/index.js \
            --compile --target=${{ matrix.target }} \
            --external webview-bun \
            --outfile dist/${{ matrix.out }}
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/${{ matrix.out }}
          fail_on_unmatched_files: true
